version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: seat-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: seat_reservation
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_general_ci
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/sql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./backend/sql/migrate.sql:/docker-entrypoint-initdb.d/02-migrate.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seat-backend
    restart: always
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: 123456
      TZ: Asia/Shanghai
    ports:
      - "8088:8088"
    volumes:
      - upload-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: seat-frontend-admin
    restart: always
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mysql-data:
  upload-data:
